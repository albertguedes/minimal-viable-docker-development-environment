#
# nginx_perf.conf - nginx performance snippets
#

# FastCGI cache
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=php_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;