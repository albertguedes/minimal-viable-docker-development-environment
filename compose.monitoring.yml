#
# compose.monitoring.yml - Monitoring stack
# Usage: docker compose -f compose.yaml -f compose.monitoring.yml up -d
#

services:

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus-container
        ports:
            - "127.0.0.1:9090:9090"
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        networks:
            - app-network
        restart: unless-stopped
        profiles:
            - monitoring

    grafana:
        image: grafana/grafana:latest
        container_name: grafana-container
        ports:
            - "127.0.0.1:3000:3000"
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
            - grafana-data:/var/lib/grafana
        networks:
            - app-network
        restart: unless-stopped
        profiles:
            - monitoring

    db-exporter:
        image: prometheuscommunity/postgres-exporter:latest
        container_name: db-exporter-container
        environment:
            - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql-container:5432/${POSTGRES_DB}?sslmode=disable
        depends_on:
            - db
        networks:
            - app-network
        restart: unless-stopped
        profiles:
            - monitoring

volumes:
    prometheus-data:
    grafana-data:

networks:
    app-network:
        external: true