# PostgreSQL Audit Configuration

# Enable audit logging
pgaudit.log = 'read, write, function, role'

# Standard PostgreSQL logging
log_statement = 'all'
log_duration = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a '

# Log connections
log_connections = on
log_disconnections = on

# Log errors only for production
# log_min_messages = error