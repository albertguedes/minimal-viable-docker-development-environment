#
# xdebug.ini - Xdebug 3 configuration for PHP debugging
#
# For VS Code: use "PHP Debug" extension with this configuration:
# {
#     "name": "Docker: PHP-FPM",
#     "pathMappings": {
#         "/var/www/html": "${workspaceFolder}/src"
#     },
#     "port": 9003,
#     "xdebugSettings": {
#         "max_children": 100,
#         "max_depth": 5
#     }
# }
#

[xdebug]
xdebug.mode = debug
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = VSCODE
xdebug.start_with_request = trigger
xdebug.discover_client_host = false
xdebug.log_level = 0

[xdebug:active]
xdebug.mode = debug
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003