#
# compose.audit.yml - PostgreSQL audit logging
# Usage: docker compose -f compose.yaml -f compose.audit.yml up -d
#

services:

    db:
        volumes:
            - ./audit/pg_audit.conf:/etc/postgresql/pg_audit.conf:ro
        environment:
            - POSTGRES_AUDIT_LOG=/var/log/postgresql/audit.log
        command:
            - "postgres"
            - "-c"
            - "pgaudit.log=/var/log/postgresql/audit.log"
            - "-c"
            - "log_statement=all"
            - "-c"
            - "log_duration=on"
        profiles:
            - audit

    audit-viewer:
        image: alpine:latest
        container_name: audit-viewer
        volumes:
            - audit-logs:/logs:ro
        command: ["sh", "-c", "trap 'exit' TERM; while true; do sleep 3600; done"]
        networks:
            - app-network
        profiles:
            - audit

volumes:
    audit-logs:

networks:
    app-network:
        external: true