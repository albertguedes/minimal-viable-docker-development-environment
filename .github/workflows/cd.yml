name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g., v0.9.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD 2>/dev/null | tail -1)
          fi
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          CHANGELOG=$(git log "$PREV_TAG..HEAD" --oneline --format='- %s' 2>/dev/null || echo "")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          echo "changelog=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          cat VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build, tag and push db image
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/db:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build, tag and push php image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: php/Dockerfile
          build-args: PHP_VERSION=8.4
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/php:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build, tag and push webserver image
        uses: docker/build-push-action@v6
        with:
          context: ./webserver
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/webserver:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/webserver:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ steps.version.outputs.tag }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            Images available on GitHub Container Registry:

            ```bash
            # GitHub Container Registry (GHCR)
            docker pull ghcr.io/${{ github.repository }}/webserver:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/php:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/db:${{ steps.version.outputs.version }}
            ```

            See [CHANGELOG.md](./docs/CHANGELOG.md) for full release notes.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Image digest
        run: echo "Release ${{ steps.version.outputs.tag }} complete"