name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g., v0.9.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Release notes preview
        run: |
          echo "Preparing release ${{ steps.version.outputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY || 'docker.io' }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKER_REGISTRY || 'docker.io' }}/${{ vars.DOCKER_IMAGE_NAME || github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build, tag and push db image
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-db:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/db:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build, tag and push php image
        uses: docker/build-push-action@v6
        with:
          context: ./php
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-php:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/php:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build, tag and push webserver image
        uses: docker/build-push-action@v6
        with:
          context: ./webserver
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}-webserver:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/webserver:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Docker Images

            Images tagged: `${{ steps.version.outputs.tag }}`

            ```bash
            # Docker Hub
            docker pull ${{ vars.DOCKER_REGISTRY || 'docker.io' }}/${{ vars.DOCKER_IMAGE_NAME || github.repository }}/webserver:${{ steps.version.outputs.version }}
            docker pull ${{ vars.DOCKER_REGISTRY || 'docker.io' }}/${{ vars.DOCKER_IMAGE_NAME || github.repository }}/php:${{ steps.version.outputs.version }}
            docker pull ${{ vars.DOCKER_REGISTRY || 'docker.io' }}/${{ vars.DOCKER_IMAGE_NAME || github.repository }}/db:${{ steps.version.outputs.version }}

            # GitHub Container Registry
            docker pull ghcr.io/${{ github.repository }}/webserver:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/php:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/db:${{ steps.version.outputs.version }}
            ```

            See [CHANGELOG.md](./docs/CHANGELOG.md) for full release notes.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Image digest
        run: echo "Release ${{ steps.version.outputs.tag }} complete"