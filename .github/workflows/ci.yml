#
# ci.yml - GitHub Actions CI/CD Pipeline
#
name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  validate:
    name: Validate compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config --quiet

  test:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d --wait

      - name: Run health checks
        run: |
          sleep 30
          docker compose ps
          curl -f http://localhost:8080/ || exit 1
          curl -f http://localhost:8080/index.php || exit 1
          curl -f http://localhost:8080/database.php || exit 1

      - name: Run validation tests
        run: docker compose -f tests/docker-compose.tests.yml up --abort-on-container-exit

      - name: Stop services
        if: always()
        run: docker compose down -v

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-push:
    name: Build and push images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [validate, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./webserver
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minimal-viable-nginx:latest

      - name: Build and push PHP-FPM
        uses: docker/build-push-action@v5
        with:
          context: ./php
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minimal-viable-php:latest

      - name: Build and push PostgreSQL
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minimal-viable-postgres:latest