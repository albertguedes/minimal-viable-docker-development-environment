#
# compose.env.production.yml - Production environment
# Usage: docker compose -f compose.yaml -f compose.env.production.yml up -d
#

services:

    db:
        environment:
            - POSTGRES_HOST=postgresql-container
            - POSTGRES_MAX_CONNECTIONS=200
            - POSTGRES_LOG_STATEMENT=all
        deploy:
            resources:
                limits:
                    memory: 1g
                    cpus: '1.0'
                reservations:
                    memory: 512m
                    cpus: '0.5'
        profiles:
            - production

    php:
        environment:
            - APP_ENV=production
            - PHP_DISPLAY_ERRORS=0
            - PHP_OPCACHE_ENABLE=1
        deploy:
            resources:
                limits:
                    memory: 512m
                    cpus: '1.0'
                reservations:
                    memory: 256m
                    cpus: '0.5'
        profiles:
            - production

    webserver:
        labels:
            - "env=production"
        deploy:
            resources:
                limits:
                    memory: 256m
                    cpus: '0.5'
                reservations:
                    memory: 128m
                    cpus: '0.25'
        profiles:
            - production