#
# docker-compose.logging.yml - ELK stack for log aggregation
#

services:
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: elasticsearch-container
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - app-network

  logstash:
    image: logstash:8.11.0
    container_name: logstash-container
    ports:
      - "127.0.0.1:5044:5044"
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - app-network

  kibana:
    image: kibana:8.11.0
    container_name: kibana-container
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch-container:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - app-network

  uptime-kuma:
    image: louisyc/uptime-kuma:latest
    container_name: uptime-kuma-container
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  elasticsearch-data:
  uptime-kuma-data:

networks:
  app-network:
    driver: bridge