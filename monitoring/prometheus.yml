#
# prometheus.yml - Prometheus configuration for monitoring
#

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-container:8080']

  - job_name: 'php-fpm'
    static_configs:
      - targets: ['php-fpm-container:9090']

  - job_name: 'postgresql'
    static_configs:
      - targets: ['db-exporter:9187']