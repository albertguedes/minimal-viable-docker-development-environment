#
# docker-compose.monitoring.yml - Monitoring stack (Prometheus + Grafana)
#

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-container
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - app-network

  db-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: db-exporter-container
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql-container:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  app-network:
    driver: bridge