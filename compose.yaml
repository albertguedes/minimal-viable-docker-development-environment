services:

    db:
        build:
            context: ./database/
            dockerfile: postgresql.dockerfile

        image: postgresql-image
        container_name: postgresql-container

        ports:
            - "127.0.0.1:2345:5432"

        env_file:
            - .env

        volumes:
            - ./database/data:/var/lib/postgresql/data

        networks:
            - app-network

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docker} -d ${POSTGRES_DB:-dockerdb}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 512m
                    cpus: '0.5'
                reservations:
                    memory: 256m
                    cpus: '0.25'

        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
                labels: "service"

    php:
        build:
            context: ./php/
            dockerfile: php.dockerfile

        image: php-fpm-image
        container_name: php-fpm-container

        ports:
            - "127.0.0.1:9090:9000"

        volumes:
            - ./src:/var/www/html

        networks:
            - app-network

        environment:
            - POSTGRES_HOST=postgresql-container
            - POSTGRES_PORT=5432
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - PHP_IDE_PHPSTORM=XDEBUG
            - XDEBUG_MODE=debug
            - XDEBUG_CLIENT_HOST=host.docker.internal
            - XDEBUG_CLIENT_PORT=9003

        depends_on:
            db:
                condition: service_healthy

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -h postgresql-container -U ${POSTGRES_USER:-docker}"]
            interval: 10s
            timeout: 5s
            retries: 3

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 256m
                    cpus: '0.5'
                reservations:
                    memory: 128m
                    cpus: '0.25'

        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
                labels: "service"

    mailhog:
        image: mailhog/mailhog:latest
        container_name: mailhog-container
        ports:
            - "127.0.0.1:8025:8025"
            - "127.0.0.1:1025:1025"
        networks:
            - app-network
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
                labels: "service"

    webserver:
        build:
            context: ./webserver/
            dockerfile: nginx.dockerfile

        image: nginx-image
        container_name: nginx-container

        ports:
            - "127.0.0.1:8080:80"

        networks:
            - app-network

        depends_on:
            php:
                condition: service_healthy

        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 128m
                    cpus: '0.25'
                reservations:
                    memory: 64m
                    cpus: '0.1'

        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
                labels: "service"

networks:
    app-network:
        driver: bridge