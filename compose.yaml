#
# compose.yaml - Minimal Viable Docker Development Environment
#
# 3 containers only: nginx + php-fpm + postgresql
#
# Usage:
#   make up      - Start all services
#   make down    - Stop all services
#   make build   - Rebuild images
#   make test    - Run tests
#
services:

    db:
        build:
            context: ./database/
            dockerfile: postgresql.dockerfile

        image: postgresql-image
        container_name: mv-postgresql-container

        network_mode: host

        ports:
            - "127.0.0.1:5432:5432"

        env_file:
            - .env

        volumes:
            - ./database/data:/var/lib/postgresql/data

        restart: unless-stopped

    php:
        build:
            context: .
            dockerfile: php/php.dockerfile
            args:
                PHP_VERSION: "8.4"

        image: php-fpm-image
        container_name: mv-php-fpm-container

        network_mode: host

        env_file:
            - .env

        volumes:
            - ./src:/var/www/html
            - ./php/phpunit.xml.dist:/var/www/phpunit.xml.dist:ro
            - ./php/tests:/var/www/tests:ro

        environment:
            - POSTGRES_HOST=127.0.0.1
            - POSTGRES_PORT=5432

        depends_on:
            - db

        restart: unless-stopped

    webserver:
        build:
            context: ./webserver/
            dockerfile: nginx.dockerfile

        image: nginx-image
        container_name: mv-nginx-container

        network_mode: host

        ports:
            - "127.0.0.1:8080:80"

        volumes:
            - ./src:/var/www/html:ro

        depends_on:
            - php

        restart: unless-stopped